name: Track FreeBSD and Release

on:
  push:
    branches: [main]
  schedule:
    - cron: '43 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: freebsd-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Fetch FreeBSD qemu-ga
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
          chmod +x scripts/fetch-freebsd-qemu-guest-agent.sh
          ./scripts/fetch-freebsd-qemu-guest-agent.sh
      - name: Build package on FreeBSD 15
        id: build
        uses: vmactions/freebsd-vm@v1.4.8
        with:
          release: '15.0'
          usesh: true
          prepare: |
            export ASSUME_ALWAYS_YES=yes
            pkg bootstrap -f
          run: |
            set -eux
            chmod +x build.sh
            version=$(cat dist/VERSION)
            printf '%s\n' "${version}" > .freebsd-qga-version
            PORTVERSION="${version}" ./build.sh package
            cp build/pkg/*.pkg ./pfSense-pkg-qemu-guest-agent-${version}.pkg
            sha256 pfSense-pkg-qemu-guest-agent-${version}.pkg > SHA256SUMS
      - name: Read built version
        id: version
        run: printf 'version=%s\n' "$(cat .freebsd-qga-version)" >> "$GITHUB_OUTPUT"
      - name: Check existing package release
        id: check
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: pfsense-${{ steps.version.outputs.version }}
        with:
          script: |
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.RELEASE_TAG
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status !== 404) throw error;
              core.setOutput('exists', 'false');
            }
      - name: Attest package
        if: steps.check.outputs.exists == 'false' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: pfSense-pkg-qemu-guest-agent-${{ steps.version.outputs.version }}.pkg
      - uses: actions/upload-artifact@v7.0.1
        if: steps.check.outputs.exists == 'false' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        with:
          name: pfSense-pkg-qemu-guest-agent-${{ steps.version.outputs.version }}
          path: |
            pfSense-pkg-qemu-guest-agent-${{ steps.version.outputs.version }}.pkg
            SHA256SUMS
      - name: Publish GitHub release
        if: steps.check.outputs.exists == 'false' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: pfsense-${{ steps.version.outputs.version }}
          name: pfSense QEMU Guest Agent ${{ steps.version.outputs.version }}
          body: |
            pfSense package for official QEMU Guest Agent ${{ steps.version.outputs.version }}, packaged from the FreeBSD 15 amd64 binary release.
          overwrite_files: true
          files: |
            pfSense-pkg-qemu-guest-agent-${{ steps.version.outputs.version }}.pkg
            SHA256SUMS
